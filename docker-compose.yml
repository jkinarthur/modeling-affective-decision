# ============================================================
# AD-DAN  –  docker-compose.yml
#
# Usage (local GPU machine or AWS EC2 with Docker):
#   docker compose run --rm addan build          # build TAD-Bench 10K
#   docker compose run --rm addan train-sft      # SFT stage
#   docker compose run --rm addan train-rl       # PPO RL stage
#   docker compose run --rm addan evaluate       # evaluate best model
#   docker compose run --rm addan smoke          # quick smoke-test (CPU-only)
#
# Environment overrides (pass with -e or a .env file):
#   TOTAL_N=10000       dataset size
#   MAX_EPOCHS=20       SFT epochs
#   BATCH_SIZE=32       batch size
#   LR=3e-5             learning rate
#   RL_EPOCHS=3         PPO outer epochs
#   PPO_EPOCHS=5        PPO inner epochs
# ============================================================

services:
  addan:
    build:
      context: .
      dockerfile: Dockerfile
    image: addan:latest

    # ---- GPU access (requires nvidia-container-toolkit) ----------
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    # ---- persistent volumes --------------------------------------
    volumes:
      # HuggingFace model cache  →  survives container restarts
      - hf_cache:/app/.cache/huggingface
      # Dataset CSVs
      - ./data:/app/data
      # Model checkpoints
      - ./checkpoints:/app/checkpoints

    # ---- environment defaults (override via .env or -e flag) -----
    environment:
      - TOTAL_N=${TOTAL_N:-10000}
      - MAX_EPOCHS=${MAX_EPOCHS:-20}
      - BATCH_SIZE=${BATCH_SIZE:-32}
      - LR=${LR:-3e-5}
      - RL_EPOCHS=${RL_EPOCHS:-3}
      - PPO_EPOCHS=${PPO_EPOCHS:-5}
      - TOKENIZERS_PARALLELISM=false
      - HF_HOME=/app/.cache/huggingface
      - TRANSFORMERS_CACHE=/app/.cache/huggingface

    # ---- named commands ------------------------------------------
    # Override the default CMD by passing a service profile name
    # via: docker compose run --rm addan <command>
    entrypoint: >
      /bin/bash -c "
        case \"$$1\" in
          build)
            python -m src.data.build_tad_bench \
              --output_dir /app/data \
              --total_n $$TOTAL_N
            ;;
          train-sft)
            python train.py \
              --stage sft \
              --data_dir /app/data \
              --output_dir /app/checkpoints/sft \
              --max_epochs $$MAX_EPOCHS \
              --batch_size $$BATCH_SIZE \
              --lr $$LR \
              --fp16
            ;;
          train-rl)
            python train.py \
              --stage rl \
              --data_dir /app/data \
              --sft_ckpt /app/checkpoints/sft/best_model \
              --output_dir /app/checkpoints/rl \
              --rl_epochs $$RL_EPOCHS \
              --ppo_epochs $$PPO_EPOCHS \
              --fp16
            ;;
          evaluate)
            python evaluate.py \
              --ckpt /app/checkpoints/sft/best_model \
              --data_dir /app/data \
              --output_csv /app/checkpoints/eval_results.csv \
              --generate
            ;;
          smoke)
            python train.py \
              --stage sft \
              --synthetic \
              --max_epochs 2 \
              --batch_size 4 \
              --no_fp16
            ;;
          *)
            exec \"$$@\"
            ;;
        esac
      " --

# ---- named volumes -----------------------------------------------
volumes:
  hf_cache:
    driver: local
